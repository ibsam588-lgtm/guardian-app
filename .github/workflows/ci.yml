name: GuardIan CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Flutter Analyze & Test ──────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Create secrets.dart from example
        run: |
          mkdir -p lib/config
          cp lib/config/secrets.example.dart lib/config/secrets.dart

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          else
            echo '{"project_info":{"project_number":"913378360413","project_id":"guardian-e28d4","storage_bucket":"guardian-e28d4.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:913378360413:android:efcc9c9a1e89e8a270e1b4","android_client_info":{"package_name":"com.guardian.app"}},"oauth_client":[{"client_id":"913378360413-4i98i0fdj98gn8r634hv27c9q2hmupk5.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyCSgmed57xmEAJm2zKbyIGc5LvX_zYg6Hg"}],"services":{"appinvite_service":{"other_platform_oauth_client":[{"client_id":"913378360413-4i98i0fdj98gn8r634hv27c9q2hmupk5.apps.googleusercontent.com","client_type":3}]}}}],"configuration_version":"1"}' > android/app/google-services.json
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

  # ── Build Android AAB (release) ─────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Create secrets
        run: |
          mkdir -p lib/config
          cp lib/config/secrets.example.dart lib/config/secrets.dart

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          else
            echo '{"project_info":{"project_number":"913378360413","project_id":"guardian-e28d4","storage_bucket":"guardian-e28d4.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:913378360413:android:efcc9c9a1e89e8a270e1b4","android_client_info":{"package_name":"com.guardian.app"}},"oauth_client":[{"client_id":"913378360413-4i98i0fdj98gn8r634hv27c9q2hmupk5.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyCSgmed57xmEAJm2zKbyIGc5LvX_zYg6Hg"}],"services":{"appinvite_service":{"other_platform_oauth_client":[{"client_id":"913378360413-4i98i0fdj98gn8r634hv27c9q2hmupk5.apps.googleusercontent.com","client_type":3}]}}}],"configuration_version":"1"}' > android/app/google-services.json
          fi

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/guardian.keystore
            cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=guardian.keystore
          EOF
          else
            echo "No keystore – using debug signing for now"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardian-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── Deploy to Play Store (internal track) ───
  deploy-play-store:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: guardian-release-aab

      - name: Deploy to Play Store internal track
        if: secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.guardian.app
          releaseFiles: app-release.aab
          track: internal
          status: completed

  # ── Deploy Firebase Functions ────────────────
  deploy-functions:
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd firebase/functions && npm install

      - name: Deploy functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only functions \
            --token "$FIREBASE_TOKEN" \
            --project guardian-e28d4 \
            --force
