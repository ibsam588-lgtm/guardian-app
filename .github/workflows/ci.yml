name: GuardIan CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Flutter Analyze & Test ──────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Create secrets.dart
        run: |
          mkdir -p lib/config
          cp lib/config/secrets.example.dart lib/config/secrets.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ── Build Android AAB (release) ─────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Create secrets.dart
        run: |
          mkdir -p lib/config
          cp lib/config/secrets.example.dart lib/config/secrets.dart

      - name: Setup keystore (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/guardian.keystore
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=guardian.keystore\n" \
              "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
          else
            echo "No keystore – using debug signing"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: guardian-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── Deploy to Play Store (internal track) ───
  deploy-play-store:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download AAB
        uses: actions/download-artifact@v4.2.1
        with:
          name: guardian-release-aab

      - name: Deploy to Play Store internal track
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.guardian.app
          releaseFiles: app-release.aab
          track: internal
          status: completed

  # ── Deploy Firebase Functions ────────────────
  deploy-functions:
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd firebase/functions && npm install

      - name: Deploy functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only functions \
            --token "$FIREBASE_TOKEN" \
            --project guardian-e28d4 \
            --force
