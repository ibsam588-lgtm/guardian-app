name: guardian_app
description: GuardIan - Parental Monitoring App
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth & Backend
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Navigation
  go_router: ^14.2.7

  # State Management
  provider: ^6.1.2

  # Location & Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Payments / Subscriptions
  in_app_purchase: ^3.2.0
  purchases_flutter: ^6.28.0

  # UI & Charts
  fl_chart: ^0.69.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  local_auth: ^2.3.0
  package_info_plus: ^8.1.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
