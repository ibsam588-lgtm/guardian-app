name: guardian_app
description: GuardIan - Parental Monitoring App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth & Backend
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.9
  google_sign_in: ^6.2.1
  cloud_firestore: ^4.15.9
  firebase_messaging: ^14.7.20

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # Location & Maps
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Payments / Subscriptions
  in_app_purchase: ^3.1.13
  purchases_flutter: ^6.28.0

  # UI & Charts
  fl_chart: ^0.67.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.6
  local_auth: ^2.2.0
  package_info_plus: ^5.0.1

  # Audio (Listen feature)
  record: ^5.1.0
  just_audio: ^0.9.38

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
